<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
</head>
<body>
    <canvas id="board" width="600" height="600" style="background-color: aqua;"></canvas>
    
    <script>
        const cnv = document.getElementById('board');
        const context = cnv.getContext('2d');
        const inc = 1
        context.fillStyle = 'black'
        //ابدا بتمثيل 4 نجط
        function corners(height,width,length,p) {//this func for cubes and ParallelRects, p is position 
            return [[p[0]+height/-2,p[1]+width/-2,p[2]+length/-2],[p[0]+height/-2,p[1]+width/-2,p[2]+length/2],
            [p[0]+height/-2,p[1]+width/2,p[2]+length/-2],[p[0]+height/-2,p[1]+width/2,p[2]+length/2],
            [p[0]+height/2,p[1]+width/-2,p[2]+length/-2],[p[0]+height/2,p[1]+width/-2,p[2]+length/2],
            [p[0]+height/2,p[1]+width/2,p[2]+length/-2],[p[0]+height/2,p[1]+width/2,p[2]+length/2]]//we divide the بعد on 2 or -2 to make 0,0,0 point in center
        }
        function consRectPoints(cors) {
            let listOfPnt = []
            for (cor in cors) {//this func construct 2,2,4 and 2,2,5 that are between 2,2,2 and 2,2,6 in all axises
                if (cors[cor][0] == cors[0][0]) {
                    for (let n = cors[1-1][1-1]; n <= cors[4][0]; n+=inc) {listOfPnt.push([n,cors[cor][1],cors[cor][2]])}
                }
                if (cors[cor][1] == cors[0][1]) {
                    for (let n = cors[1-1][1]; n < cors[2][1]; n+=inc) {listOfPnt.push([cors[cor][0],n,cors[cor][2]])}
                }
                if (cors[cor][2] == cors[0][2]) {
                    for (let n = cors[1-1][2]; n < cors[1][2]; n+=inc) {listOfPnt.push([cors[cor][0],cors[cor][1],n])}
                }
            }
            return listOfPnt
        }
        //to construct some points,give me every point alone
        function cons_point(spcPointBtwEye,shapecor) {
            shapecor[0]/=124;//the solve of expanding of z axis
            shapecor[0]=spcPointBtwEye-shapecor[0] //<this is space between eye and cor
            if (shapecor[0] !== 0) {
                context.fillRect(Math.round(cnv.width/2-1 +spcPointBtwEye*shapecor[1]/shapecor[0]),Math.round(cnv.height/2-1 +spcPointBtwEye*shapecor[2]/shapecor[0]),1,1)
            }
        }
        function Rotate(allPoints,axis,degrees,cenOfRot,spcPointBtwEye) {
            let axises =[]
            //showing the role of axises
            if (axis.toLowerCase() == 'x') {axises = [1,0]//index of x and z in the point list 
            }                                                        // beside   acrossFrom
            else if (axis.toLowerCase() == 'y') {axises = [2,0]//index of y and z in the point list
            }                                                          // beside   acrossFrom
            else if (axis.toLowerCase() == 'z') {axises = [1,2]//index of x and y in the point list
            }let th = 0;let theta = 0
            setInterval(()=>{
            if (th < degrees*Math.PI/180) {
                context.clearRect(0,0,cnv.width,cnv.height)
                for (let pnt in allPoints) {  //dist is sqrt of beside*itself + across from*itself
                    let dist = Math.sqrt(Math.pow(allPoints[pnt][axises[0]]-cenOfRot[axises[0]],2) + Math.pow(allPoints[pnt][axises[1]]-cenOfRot[axises[1]],2))
                    let beside = allPoints[pnt][axises[0]]-cenOfRot[axises[0]];theta = Math.acos(beside/dist)//get theata that has the last cos
                    if (allPoints[pnt][axises[1]]-cenOfRot[axises[1]] < 0) {//if y in cir is -,get -theta
                    theta = 2*Math.PI - theta}
                    theta+= th//to make theta increas every setInterval frame
                    if (axis.toLowerCase() == 'x') {cons_point(spcPointBtwEye,[Math.round(cenOfRot[axises[1]]+Math.sin(theta)*dist),Math.round(cenOfRot[axises[0]]+Math.cos(theta)*dist),allPoints[pnt][2]])//
                    }
                    else if (axis.toLowerCase() == 'y') {cons_point(spcPointBtwEye,[Math.round(cenOfRot[axises[1]]+Math.sin(theta)*dist),allPoints[pnt][1],Math.round(cenOfRot[axises[0]]+Math.cos(theta)*dist)])//
                    }
                    else if (axis.toLowerCase() == 'z') {cons_point(spcPointBtwEye,[allPoints[pnt][0],Math.round(cenOfRot[axises[0]]+Math.cos(theta)*dist),Math.round(cenOfRot[axises[1]]+Math.sin(theta)*dist)])//
                    }
                }
                th+= Math.PI/180;
            }
            },16)
        }//       [z , x , y]
        function collectPoints(points1,points2) {
            let list = [];let maxValue = Math.max(points1.length,points2.length)
            for (let index = 0; index < maxValue; index++) {
                if (index < points1.length) {list.push(points1[index])}
                if (index < points2.length) {list.push(points2[index])}
            }
            return list
        }
        Rotate(consRectPoints(corners(62/2,62/2,62,[0,0,0])),'x',  364  ,  [0,0,0] ,           1)
        //                     allPoints ,                    axis, degrees,cenOfRot,spcPointBtwEye and [0,0,0]
    </script>
</body>

</html>
